name: CI — Harness de Validacao

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (Camada 1 — estilo)
        run: npm run lint

      - name: Typecheck (Camada 2 — tipos)
        run: npm run typecheck

      - name: Testes de Contrato (Camada 3 — regras de negocio)
        run: npm run test

      - name: Harness completo
        run: npm run verify

  verify-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias do frontend
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint do frontend
        working-directory: frontend
        run: npx eslint . --ext .ts --config eslint.config.js
