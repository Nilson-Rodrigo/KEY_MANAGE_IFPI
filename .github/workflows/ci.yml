name: CI — Harness de Validacao

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  verify-admin-tooling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm ci

      - name: Validar tooling administrativo
        run: npm run verify

      - name: Compilar tooling administrativo
        run: npm run build

      - name: Validar regras de segurança no emulador
        run: npm run rules:check

  verify-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias do frontend
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Harness do frontend
        working-directory: frontend
        run: npm run verify

      - name: Build web do frontend
        working-directory: frontend
        run: npm run build

      - name: Validar projeto Expo
        working-directory: frontend
        run: npx expo-doctor
